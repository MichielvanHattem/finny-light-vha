# Profiel: YoungTech zelfboeker - MCP-only tier
# Cluster 2 update 11 mei 2026: capability_status_meta toegevoegd, scenario_with_facts UIT.

profile_id = "youngtech_mcp_only"
display_name = "YoungTech (zelfboeker, MCP-only)"
tier = "youngtech"
schema_version = 1

enabled_sources = ["mcp_eboekhouden"]

[capabilities]
current_bookkeeping = true
recent_transactions = true
customer_debtors = true
supplier_creditors = true

historical_pdf_analysis = false
csv_history = false
xaf_auditfile = false
multi_year_comparison = false

# Toegevoegd 11 mei 2026 (TESTSET v2):
capability_status_meta = true
scenario_with_facts = false

historical_years_supported = false
requires_refusal_on_missing_history = true

allowed_question_scopes = [
    "current_bookkeeping",
    "recent_transactions",
    "customer_debtors",
    "supplier_creditors",
    "capability_status",
]

[refusal_policy]
refuse_if_required_source_missing = true
explain_missing_capability = true
suggest_upgrade_tier = false
refusal_message_template = "Deze YoungTech-configuratie heeft alleen toegang tot je actuele e-Boekhouden via MCP. {missing_capability} valt buiten deze tier. {explanation}"

[prompt_policy]
prompt_policy_id = "youngtech_mcp_only_v1"
base_template_path = "prompts/youngtech.md"
capability_description = "Je gebruikt e-Boekhouden via MCP/REST voor lopende boekhoudvragen. Historische jaarrekeningen, multi-jaar-vergelijkingen of XAF-auditfiles vallen buiten deze configuratie en moet je vriendelijk weigeren."

allowed_for_tenants = []
